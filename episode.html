<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>פרק</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      margin-bottom: 15px;
      white-space: pre-wrap;
    }

    iframe {
      width: 100%;
      height: 220px;
      border-radius: 12px;
      border: none;
      margin-bottom: 15px;
    }

    .back {
      display: block;
      text-align: center;
      padding: 10px;
      background: #333;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
    }

    .debug {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title" id="title">טוען...</div>

    <iframe id="video" allowfullscreen></iframe>

    <div class="desc" id="desc"></div>

    <a class="back" href="index.html">⬅ חזרה לדף הבית</a>

    <div class="debug" id="debug"></div>

  </div>

</div>

<<script>

const SHEET_ID = "1TGq0fcor5DKlLQgVvrQJ3VoZCp714vesMov_h0Ixhcg";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

function getVideoId(url) {
  if (!url) return "";

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  return "";
}

fetch(URL)
  .then(res => res.json())
  .then(data => {

    // פרק נוכחי
    const currentIndex = data.findIndex(ep =>
      String(ep.id).trim() === String(id).trim()
    );

    const ep = data[currentIndex];

    if (!ep) {
      document.getElementById("title").innerText = "פרק לא נמצא";
      return;
    }

    // הצגת פרק
    document.getElementById("title").innerText = ep.title || "";
    document.getElementById("desc").innerText = ep.fullDesc || ep.shortDesc || "";

    const videoId = getVideoId(ep.link);

    if (videoId) {
      document.getElementById("video").src =
        `https://www.youtube.com/embed/${videoId}`;
    }

    // 🔥 סינון לפי סדרה
    const sameSeries = data.filter(item =>
      item.series === ep.series
    );

    const seriesIndex = sameSeries.findIndex(item =>
      item.id === ep.id
    );

    const prev = sameSeries[seriesIndex - 1];
    const next = sameSeries[seriesIndex + 1];

    // שם הפרק הנוכחי
    const nav = document.createElement("div");
    nav.style.marginTop = "15px";
    nav.style.textAlign = "center";
    nav.style.fontWeight = "bold";

    nav.innerText = "📖 " + ep.title;
    document.querySelector(".card").appendChild(nav);

    // כפתורים
    const buttons = document.createElement("div");
    buttons.style.display = "flex";
    buttons.style.gap = "10px";
    buttons.style.marginTop = "10px";

    if (prev) {
      buttons.innerHTML += `
        <a class="back" style="flex:1;background:#555;" href="episode.html?id=${prev.id}">
          ⬅ פרק קודם
        </a>
      `;
    }

    if (next) {
      buttons.innerHTML += `
        <a class="back" style="flex:1;background:#555;" href="episode.html?id=${next.id}">
          פרק הבא ➡
        </a>
      `;
    }

    document.querySelector(".card").appendChild(buttons);

  })
  .catch(err => {
    console.error(err);
  });
