<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>פרק</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .desc {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      margin-bottom: 10px;
      white-space: pre-wrap;
    }

    iframe {
      width: 100%;
      height: 220px;
      border-radius: 12px;
      border: none;
      margin-bottom: 10px;
    }

    .nav {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      background: #333;
      font-size: 14px;
    }

    .btn.secondary {
      background: #555;
    }

    .series-title {
      margin-top: 10px;
      font-weight: bold;
      text-align: center;
      color: #222;
    }

    .error {
      color: red;
      text-align: center;
      margin-top: 10px;
    }

    /* 🔥 כפתור חזרה קבוע ובולט */
    .back-full {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      text-align: center;
      background: #0f172a;
      color: white;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      box-sizing: border-box;
    }
    .no-video {
  text-align: center;
  margin-top: 10px;
}

.no-video img {
  width: 100%;
  border-radius: 12px;
  margin-bottom: 15px;
}

.sleep-msg {
  background: #fff4cc;
  border: 2px solid #facc15;
  border-radius: 12px;
  padding: 15px;
  font-size: 16px;
  line-height: 1.8;
  font-weight: bold;
  color: #444;
}

  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="title" id="title">טוען...</div>

    <iframe id="video"></iframe>

    <div class="desc" id="desc"></div>

    <div class="series-title" id="series"></div>

    <!-- 🔥 ניווט -->
    <div class="nav" id="nav"></div>

    <!-- 🔥 כפתור חזרה -->
    <a class="back-full" href="index.html">
      ⬅ חזרה למסך הראשי
    </a>

    <div class="error" id="error"></div>

  </div>

</div>

<script>

const SHEET_ID = "1TGq0fcor5DKlLQgVvrQJ3VoZCp714vesMov_h0Ixhcg";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const sleepingImage =
  "https://raw.githubusercontent.com/siporeySaba/s01/blob/main/1779343032290.png";
  
function getVideoId(url) {
  if (!url) return "";

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  return "";
}

fetch(URL)
  .then(res => res.json())
  .then(data => {

    // 🔥 מציאת פרק לפי ID
    let ep = data.find(item =>
      String(item.id).trim() === String(id).trim()
    );

    if (!ep) {
      document.getElementById("title").innerText = "פרק לא נמצא";
      document.getElementById("error").innerText = "לא נמצא פרק עם מזהה כזה";
      return;
    }

    // הצגת פרק
    document.getElementById("title").innerText = ep.title || "";
    document.getElementById("desc").innerText = ep.fullDesc || ep.shortDesc || "";

    const videoId = getVideoId(ep.link);

    const video = document.getElementById("video");

if (videoId) {

  video.src =
    `https://www.youtube.com/embed/${videoId}`;

} else {

  video.style.display = "none";

  const noVideo = document.createElement("div");

  noVideo.className = "no-video";

  noVideo.innerHTML = `
    <img src="https://i.imgur.com/M15F39y.jpeg">

    <div class="sleep-msg">
      סבא הלך לישון 😴<br><br>

      לצערינו הפרק לא זמין לצפייה כרגע.<br><br>

      שילחו לנו הודעה ונסדר זאת בהקדם.<br><br>

      (בלי להעיר את סבא כמובן 🤣)
    </div>
  `;

  document.querySelector(".card")
    .insertBefore(
      noVideo,
      document.getElementById("desc").nextSibling
    );
}

    // 🔥 פרקים מאותה סדרה
    const sameSeries = data.filter(item =>
      item.series === ep.series
    );

    const currentIndex = sameSeries.findIndex(item =>
      String(item.id) === String(ep.id)
    );

    const prev = sameSeries[currentIndex - 1];
    const next = sameSeries[currentIndex + 1];

    const nav = document.getElementById("nav");
    nav.innerHTML = "";

    if (prev) {
      nav.innerHTML += `
        <a class="btn secondary" href="episode.html?id=${prev.id}">
          ⬅ פרק קודם
        </a>
      `;
    }

    if (next) {
      nav.innerHTML += `
        <a class="btn" href="episode.html?id=${next.id}">
          פרק הבא ➡
        </a>
      `;
    }

  })
  .catch(err => {
    document.getElementById("error").innerText =
      "שגיאה בטעינת נתונים";
    console.error(err);
  });

</script>

</body>
</html>
