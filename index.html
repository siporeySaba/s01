<script>

fetch('episodes.json')
.then(response => response.json())
.then(async data => {

  const container = document.getElementById('episodes');

  for (const ep of data) {

    // שליפת מידע מיוטיוב
    const res = await fetch(
      `https://www.youtube.com/oembed?url=${ep.link}&format=json`
    );

    const yt = await res.json();

    container.innerHTML += `
      <div class="card">

        <img src="${yt.thumbnail_url}">

        <div class="card-content">

          <div class="title">${yt.title}</div>

          <div class="desc">
            ${ep.desc || ""}
          </div>

          <a class="btn"
             href="${ep.link}"
             target="_blank">
             ▶ לצפייה בפרק
          </a>

        </div>

      </div>
    `;
  }

});

</script>
