<script>

fetch('episodes.json')
.then(response => response.json())
.then(data => {

  const container = document.getElementById('episodes');

  data.forEach(ep => {

    const videoId = ep.link.split('v=')[1];

    const thumbnail =
      `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

    container.innerHTML += `
      <div class="card">

        <img src="${thumbnail}">

        <div class="card-content">

          <div class="title">${ep.title}</div>

          <div class="desc">${ep.desc}</div>

          <a class="btn"
             href="${ep.link}"
             target="_blank">
             ▶ לצפייה בפרק
          </a>

        </div>

      </div>
    `;
  });

});

</script>
