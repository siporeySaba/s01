<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>סיפורי סבא</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      margin-bottom: 15px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .card-content {
      padding: 10px;
    }

    .title {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .desc {
      font-size: 14px;
      color: #555;
    }

    .buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      display: block;
    }

    .youtube {
      background: #ff0000;
      color: white;
    }

    .entry {
      background: #333;
      color: white;
    }

    .filters {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .filters button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #ddd;
    }

    .filters button:active {
      background: #bbb;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="filters">
    <button onclick="render('all')">הכל</button>
    <button onclick="render('stories')">סיפורים</button>
    <button onclick="render('parasha')">פרשה</button>
  </div>

  <div id="episodes"></div>

</div>

<script>

const SHEET_ID = "1TGq0fcor5DKlLQgVvrQJ3VoZCp714vesMov_h0Ixhcg";
const URL = `https://opensheet.elk.sh/${SHEET_ID}/Sheet1`;

let dataGlobal = [];

const defaultImages = {
  stories: "https://i.imgur.com/GDu9Lk5.jpeg",
  parasha: "https://i.imgur.com/wfc0OV8.jpeg",
  default: "https://i.imgur.com/GDu9Lk5.jpeg"
};

function getVideoId(url) {
  if (!url) return "";

  if (url.includes("v=")) {
    return url.split("v=")[1].split("&")[0];
  }

  if (url.includes("youtu.be/")) {
    return url.split("youtu.be/")[1].split("?")[0];
  }

  return "";
}

function render(filter = "all") {

  const container = document.getElementById("episodes");
  container.innerHTML = "";

  const filtered =
    filter === "all"
      ? dataGlobal
      : dataGlobal.filter(ep => ep.series === filter);

  filtered.forEach((ep, index) => {

    const videoId = getVideoId(ep.link);

    const youtubeThumb = videoId
      ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
      : "";

    const fallback =
      defaultImages[ep.series] || defaultImages.default;

    const imageToShow = youtubeThumb || fallback;

    container.innerHTML += `
      <div class="card">

        <img src="${imageToShow}">

        <div class="card-content">

          <div class="title">${ep.title || ""}</div>
          <div class="desc">${ep.shortDesc || ""}</div>

          <div class="buttons">

            <a class="btn youtube" href="${ep.link}" target="_blank">
              ▶ יוטיוב
            </a>

            <a class="btn entry" href="episode.html?index=${index}">
              📖 פרק
            </a>

          </div>

        </div>

      </div>
    `;
  });
}

fetch(URL)
  .then(res => res.json())
  .then(data => {
    dataGlobal = data;
    render("all");
  })
  .catch(err => {
    console.error("שגיאה:", err);
  });

</script>

</body>
</html>
