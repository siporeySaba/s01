<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>דשבורד ניהול</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
  background:#f4f6fb;
}

/* Sidebar */
.sidebar{
  width:220px;
  background:#1f2937;
  color:white;
  padding:20px;
}

.sidebar h2{
  font-size:18px;
  margin-bottom:20px;
}

.menu-item{
  padding:10px;
  margin:5px 0;
  background:#374151;
  border-radius:8px;
  cursor:pointer;
}

.menu-item:hover{
  background:#4b5563;
}

/* Main */
.main{
  flex:1;
  padding:20px;
}

/* Cards */
.card{
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  margin-bottom:15px;
}

/* Inputs */
input, select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  padding:10px 15px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>📊 דשבורד</h2>

  <div class="menu-item" onclick="showPage('add')">➕ הוספת פרק</div>
  <div class="menu-item" onclick="showPage('list')">📚 כל הפרקים</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LOGIN -->
  <div id="loginBox" class="card">
    <h3>🔐 כניסה</h3>
    <input id="code" placeholder="קוד 4 ספרות">
    <button onclick="login()">כניסה</button>
  </div>

  <!-- ADD EPISODE -->
  <div id="addPage" class="card" style="display:none">

    <h3>➕ הוספת פרק</h3>

    <input id="title" placeholder="כותרת">
    <input id="shortDesc" placeholder="תיאור קצר">
    <input id="fullDesc" placeholder="תיאור מלא">
    <input id="link" placeholder="יוטיוב">

    <select id="series">
      <option value="stories">סיפורים</option>
      <option value="parasha">פרשת שבוע</option>
    </select>

    <button onclick="saveEpisode()">💾 שמור</button>

  </div>

  <!-- LIST -->
  <div id="listPage" class="card" style="display:none">
    <h3>📚 פרקים</h3>
    <div id="episodesList"></div>
  </div>

</div>

<script>

const ADMIN_CODE = "1234";


const TOKEN = "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";

const REPO = "siporeySaba/s01";
const FILE = "episodes.json";

let cachedSha = null;

function login(){
  const code = document.getElementById("code").value;

  if(code === ADMIN_CODE){
    document.getElementById("loginBox").style.display = "none";
    showPage("add");
    loadEpisodes();
  } else {
    alert("קוד שגוי");
  }
}

function showPage(page){
  document.getElementById("addPage").style.display = "none";
  document.getElementById("listPage").style.display = "none";

  const el = document.getElementById(page + "Page");
  if(el) el.style.display = "block";
}

/* =========================
   LOAD EPISODES (SAFE)
========================= */
async function loadEpisodes(){

  try {

    const url = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const res = await fetch(url, {
      headers: {
        Authorization: `token ${TOKEN}`
      }
    });

    console.log("STATUS:", res.status);

    const file = await res.json();
    console.log("GITHUB RESPONSE:", file);

    if(!res.ok){
      throw new Error("GitHub error: " + res.status);
    }

    const json = JSON.parse(atob(file.content));

    console.log("PARSED JSON:", json);

    const list = document.getElementById("episodesList");
    list.innerHTML = "";

    json.forEach(ep => {
      list.innerHTML += `
        <div class="card">
          <b>${ep.title}</b><br>
          <small>${ep.series}</small>
        </div>
      `;
    });

  } catch(err){
    console.error("FULL ERROR:", err);
    alert("שגיאה אמיתית - פתח קונסול (F12)");
  }
}
/* =========================
   SAVE EPISODE (SAFE)
========================= */
async function saveEpisode(){

  try {

    const newEp = {
      title: title.value,
      shortDesc: shortDesc.value,
      fullDesc: fullDesc.value,
      link: link.value,
      series: series.value
    };

    const url = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

    const res = await fetch(url, {
      headers: {
        Authorization: `token ${TOKEN}`
      }
    });

    if(!res.ok){
      throw new Error("GitHub fetch failed: " + res.status);
    }

    const file = await res.json();

    const json = JSON.parse(atob(file.content));

    json.push(newEp);

    const updatedContent = btoa(
      unescape(
        encodeURIComponent(JSON.stringify(json, null, 2))
      )
    );

    const updateRes = await fetch(url, {
      method: "PUT",
      headers: {
        Authorization: `token ${TOKEN}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: "add episode",
        content: updatedContent,
        sha: file.sha
      })
    });

    if(!updateRes.ok){
      throw new Error("GitHub save failed");
    }

    alert("✔ נשמר בהצלחה");
    loadEpisodes();

  } catch(err){
    console.error(err);
    alert("❌ שגיאה בשמירה - פתח קונסול");
  }
}

</script>

</body>
</html>
